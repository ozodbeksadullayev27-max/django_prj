{% extends 'ozodapp/base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h1>Qidiruv natijalari</h1>
    <div class="row my-5">
        {% for item in search_objs %}
        <div class="col-lg-4">
            <div class="card" style="width: 100%;">
                <a href="{{item.get_absolute_url}}">
                    <img src="{{ item.image.url }}" style="margin: 0px; border-radius: 5px;" class="card-img-top"
                        alt="...">
                </a>
                <div class="card-body">
                    <h5 class="card-title">{{item.title}}</h5>

                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
